<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c98e"/>
      <stop offset="100%" stop-color="#c8a96e"/>
    </linearGradient>
    <linearGradient id="bgCircle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1a14"/>
      <stop offset="100%" stop-color="#0d0b08"/>
    </linearGradient>
  </defs>

  <!-- Círculo de fundo -->
  <circle cx="30" cy="30" r="26" fill="url(#bgCircle)"/>
  <circle cx="30" cy="30" r="24" fill="none" stroke="url(#gold)" stroke-width="1.2"/>
  <circle cx="30" cy="30" r="21" fill="none" stroke="url(#gold)" stroke-width="0.4" stroke-dasharray="3 2" opacity="0.5"/>

  <!-- Tesoura — lâmina esquerda -->
  <g transform="rotate(-28, 30, 30)">
    <rect x="28.5" y="16" width="3" height="16" rx="1.5" fill="url(#gold)"/>
    <rect x="29.2" y="16.5" width="1.5" height="14" rx="0.7" fill="#0d0b08" opacity="0.35"/>
    <ellipse cx="24" cy="38" rx="4" ry="6.5" fill="none" stroke="url(#gold)" stroke-width="2"/>
  </g>

  <!-- Tesoura — lâmina direita -->
  <g transform="rotate(28, 30, 30)">
    <rect x="28.5" y="16" width="3" height="16" rx="1.5" fill="url(#gold)"/>
    <rect x="29.2" y="16.5" width="1.5" height="14" rx="0.7" fill="#0d0b08" opacity="0.35"/>
    <ellipse cx="36" cy="38" rx="4" ry="6.5" fill="none" stroke="url(#gold)" stroke-width="2"/>
  </g>

  <!-- Pino central -->
  <circle cx="30" cy="30" r="2.8" fill="url(#gold)"/>
  <circle cx="30" cy="30" r="1.3" fill="#0d0b08"/>

  <!-- Linha divisória vertical sutil -->
  <line x1="64" y1="12" x2="64" y2="48" stroke="url(#gold)" stroke-width="0.8" opacity="0.4"/>

  <!-- Texto DON CORTES -->
  <text
    x="75"
    y="27"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="15"
    font-weight="700"
    font-style="italic"
    fill="url(#gold)"
    letter-spacing="2"
  >DON CORTES</text>

  <!-- Subtítulo BARBEARIA -->
  <text
    x="76"
    y="42"
    font-family="Arial, sans-serif"
    font-size="7.5"
    font-weight="400"
    fill="#9a9080"
    letter-spacing="4.5"
  >BARBEARIA</text>

  <!-- Linhas decorativas sob o subtítulo -->
  <line x1="75" y1="47" x2="130" y2="47" stroke="url(#gold)" stroke-width="0.6" opacity="0.5"/>
  <line x1="75" y1="49.5" x2="110" y2="49.5" stroke="url(#gold)" stroke-width="0.3" opacity="0.3"/>
</svg>
